<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <style>
    :root {
      --ink: #101821;
      --muted: #516172;
      --coral: #ff6b5f;
      --teal: #11a69a;
      --gold: #f8bd35;
      --blue: #2f80ed;
      --plum: #7c4dff;
      --shadow: rgba(16, 24, 33, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 107, 95, 0.22), transparent 30%),
        radial-gradient(circle at 84% 16%, rgba(17, 166, 154, 0.24), transparent 30%),
        linear-gradient(135deg, #fff8ec 0%, #edf9ff 48%, #f8f1ff 100%);
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 34px;
      isolation: isolate;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100vw;
      margin: -34px calc(50% - 50vw) 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px max(22px, calc((100vw - 1040px) / 2 + 22px));
      border-bottom: 1px solid rgba(16, 24, 33, 0.14);
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 18px 50px rgba(16, 24, 33, 0.12);
      backdrop-filter: blur(20px);
      transition: padding 220ms ease, background 220ms ease, box-shadow 220ms ease;
    }

    .site-header.is-scrolled {
      padding-top: 8px;
      padding-bottom: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 12px 34px rgba(16, 24, 33, 0.10);
    }

    .site-header.is-scrolled .logo-mark {
      width: 36px;
      height: 36px;
    }

    .site-header.is-scrolled .main-nav a {
      min-height: 34px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: var(--ink);
      font-weight: 950;
      text-decoration: none;
      white-space: nowrap;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 950;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 46%),
        linear-gradient(135deg, var(--coral), var(--plum));
      box-shadow: 0 12px 26px rgba(124, 77, 255, 0.26);
    }

    .logo-text {
      display: grid;
      gap: 2px;
      line-height: 1;
    }

    .logo-text strong {
      font-size: 0.98rem;
    }

    .logo-text span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .main-nav {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.52)),
        linear-gradient(135deg, rgba(255, 107, 95, 0.12), rgba(17, 166, 154, 0.12), rgba(124, 77, 255, 0.12));
    }

    .main-nav a {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 950;
      text-decoration: none;
      overflow: hidden;
      transition: color 180ms ease, transform 180ms ease, min-height 220ms ease;
    }

    .main-nav a::before {
      content: "";
      position: absolute;
      inset: 5px;
      z-index: -1;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.72);
      opacity: 0;
      transform: scale(0.78);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .main-nav a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 7px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--coral), var(--gold), var(--teal));
      opacity: 0;
      transform: translateX(-50%) scaleX(0.35);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .main-nav a:hover {
      color: var(--ink);
      transform: translateY(-2px);
    }

    .main-nav a:hover::before,
    .main-nav a.active::before {
      opacity: 1;
      transform: scale(1);
    }

    .main-nav a:hover::after,
    .main-nav a.active::after {
      opacity: 1;
      transform: translateX(-50%) scaleX(1);
    }

    .main-nav a.active {
      color: var(--ink);
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(rgba(16, 24, 33, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 24, 33, 0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    .contact-shell {
      width: min(1040px, 100%);
      min-height: calc(100vh - 146px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: center;
      padding: clamp(26px, 5vw, 58px);
      border: 1px solid rgba(16, 24, 33, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 32px 100px var(--shadow);
      backdrop-filter: blur(24px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      color: var(--teal);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 8vw, 7.5rem);
      line-height: 0.86;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 2px var(--ink);
      text-shadow: 7px 7px 0 rgba(248, 189, 53, 0.50);
    }

    .lead {
      max-width: 560px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      line-height: 1.75;
    }

    .contact-list {
      display: grid;
      gap: 14px;
      margin-top: 34px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(16, 24, 33, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
    }

    .contact-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 950;
      background: linear-gradient(135deg, var(--coral), var(--plum));
    }

    .contact-item strong,
    .contact-item span { display: block; }
    .contact-item span { margin-top: 4px; color: var(--muted); }

    .form-card {
      position: relative;
      padding: clamp(22px, 4vw, 34px);
      border: 1px solid rgba(16, 24, 33, 0.14);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.62));
      box-shadow: 0 28px 70px rgba(16, 24, 33, 0.14);
      overflow: hidden;
    }

    .form-card::before {
      content: "";
      position: absolute;
      top: -70px;
      right: -70px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(from 90deg, rgba(255, 107, 95, 0.42), rgba(17, 166, 154, 0.38), rgba(124, 77, 255, 0.40), rgba(255, 107, 95, 0.42));
    }

    form {
      position: relative;
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 900;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(16, 24, 33, 0.14);
      border-radius: 8px;
      padding: 14px 15px;
      color: var(--ink);
      font: inherit;
      background: rgba(255, 255, 255, 0.78);
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(124, 77, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.12);
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 950;
      font: inherit;
      background: linear-gradient(135deg, var(--coral), var(--plum));
      box-shadow: 0 16px 30px rgba(124, 77, 255, 0.25);
      cursor: pointer;
    }

    @media (max-width: 860px) {
      .page { padding: 22px; }

      .site-header {
        width: 100vw;
        margin: -22px calc(50% - 50vw) 22px;
        padding: 12px 22px;
      }
      .contact-shell { grid-template-columns: 1fr; min-height: auto; }
    }

    @media (max-width: 560px) {

      .site-header {
        align-items: stretch;
        flex-direction: column;
      }

      .main-nav {
        width: 100%;
        justify-content: space-between;
      }

      .main-nav a {
        flex: 1;
        min-height: 40px;
        padding: 0 10px;
      }
      .contact-shell { padding: 24px; }
      h1 span { -webkit-text-stroke-width: 1px; text-shadow: 5px 5px 0 rgba(248, 189, 53, 0.50); }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Contact page">

    <header class="site-header" aria-label="Site header">
      <a class="logo" href="index.html" aria-label="Go to home page">
        <span class="logo-mark">DN</span>
        <span class="logo-text"><strong>Deep Narayan</strong><span>Creative Web</span></span>
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a class="active" aria-current="page" href="contact.html">Contact</a>
      </nav>
    </header>
    <section class="contact-shell">
      <div>
        <p class="eyebrow">Let us connect</p>
        <h1>Contact <span>Me</span></h1>
        <p class="lead">Have an idea, project, or question? Send a note and this page is ready to make the conversation feel sharp from the first click.</p>
        <div class="contact-list" aria-label="Contact details">
          <div class="contact-item"><span class="contact-icon">@</span><div><strong>Email</strong><span>hello@example.com</span></div></div>
          <div class="contact-item"><span class="contact-icon">#</span><div><strong>Social</strong><span>@deepnarayan</span></div></div>
          <div class="contact-item"><span class="contact-icon">+</span><div><strong>Response</strong><span>Usually within one day</span></div></div>
        </div>
      </div>

      <div class="form-card">
        <form>
          <label>Name<input type="text" name="name" placeholder="Your name" /></label>
          <label>Email<input type="email" name="email" placeholder="you@example.com" /></label>
          <label>Message<textarea name="message" placeholder="Tell me what you want to build"></textarea></label>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const siteHeader = document.querySelector('.site-header');

    function updateHeaderSize() {
      siteHeader.classList.toggle('is-scrolled', window.scrollY > 16);
    }

    updateHeaderSize();
    window.addEventListener('scroll', updateHeaderSize, { passive: true });
  </script>
</body>
</html>
